name: Publish Pages

on:
  workflow_run:
    workflows: ["Build OpenWrt"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Build OpenWrt run id (from actions/runs/<id>) [Optional]"
        required: false
        type: string

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: publish-pages
  cancel-in-progress: true

jobs:
  publish_pages:
    name: Publish files to Pages
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-22.04
    env:
      OPENWRT_SERIES: "24.10"

    steps:
      - name: Resolve build run id
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          INPUT_RUN_ID: ${{ github.event.inputs.run_id }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_RUN_ID:-}" ]; then
            run_id="$INPUT_RUN_ID"
          elif [ -n "${WORKFLOW_RUN_ID:-}" ]; then
            run_id="$WORKFLOW_RUN_ID"
          else
            run_id="$(gh run list --workflow 'Build OpenWrt' --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId')"
          fi

          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "Unable to determine Build OpenWrt run id" >&2
            exit 1
          fi

          if [ -n "${WORKFLOW_RUN_ID:-}" ] && [ "$run_id" = "$WORKFLOW_RUN_ID" ] && [ -n "${WORKFLOW_HEAD_SHA:-}" ]; then
            head_sha="$WORKFLOW_HEAD_SHA"
          else
            head_sha="$(gh run view "$run_id" --json headSha --jq '.headSha')"
          fi

          if [ -z "$head_sha" ] || [ "$head_sha" = "null" ]; then
            echo "Unable to determine Build OpenWrt head sha for run id: $run_id" >&2
            exit 1
          fi

          echo "BUILD_RUN_ID=$run_id" >> "$GITHUB_ENV"
          echo "BUILD_HEAD_SHA=$head_sha" >> "$GITHUB_ENV"
          echo "Using Build OpenWrt run id: $run_id"
          echo "Using Build OpenWrt head sha: $head_sha"

      - name: Checkout repository at build commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_HEAD_SHA }}
          path: build-src

      - name: Checkout repository at current commit
        uses: actions/checkout@v4
        with:
          path: site-src

      - name: Get version
        run: |
          version=$(cat "$GITHUB_WORKSPACE/build-src/frp.ver")
          echo "FRP_VERSION=$version" >> "$GITHUB_ENV"
          echo "FRP Version: $version"

      - name: Download build artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          rm -rf artifacts
          mkdir -p artifacts
          gh run download "$BUILD_RUN_ID" --dir artifacts
          find artifacts -maxdepth 2 -type d | sort

      - name: Install ipk index tools
        run: |
          set -euo pipefail
          sudo apt-get -qq update
          sudo apt-get -qq install libarchive-tools build-essential cmake

      - name: Prepare usign for package signatures
        env:
          USIGN_PRIVATE_KEY: ${{ secrets.USIGN_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${USIGN_PRIVATE_KEY:-}" ]; then
            echo "No USIGN_PRIVATE_KEY secret configured; skipping Packages.sig generation"
            exit 0
          fi

          git clone --depth 1 https://git.openwrt.org/project/usign.git /tmp/usign
          cmake -S /tmp/usign -B /tmp/usign/build
          cmake --build /tmp/usign/build -j"$(nproc)"

          printf '%s' "$USIGN_PRIVATE_KEY" > "$RUNNER_TEMP/usign.key"
          chmod 600 "$RUNNER_TEMP/usign.key"

          echo "USIGN_BIN=/tmp/usign/build/usign" >> "$GITHUB_ENV"
          echo "USIGN_KEY=$RUNNER_TEMP/usign.key" >> "$GITHUB_ENV"

      - name: Prepare public key for Pages
        env:
          USIGN_PUBLIC_KEY: ${{ secrets.USIGN_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${USIGN_PUBLIC_KEY:-}" ]; then
            echo "USIGN_PUBLIC_KEY secret is required for publishing frp.pub" >&2
            exit 1
          fi

          printf '%s\n' "$USIGN_PUBLIC_KEY" > "$RUNNER_TEMP/frp.pub"

      - name: Generate Pages feed layout
        run: |
          set -euo pipefail

          repo_name="frp"
          ipk_base_dir="$GITHUB_WORKSPACE/pages/openwrt-${OPENWRT_SERIES}"
          apk_base_dir="$GITHUB_WORKSPACE/pages/SNAPSHOT"
          mkdir -p "$ipk_base_dir" "$apk_base_dir"
          touch "$GITHUB_WORKSPACE/pages/.nojekyll"
          echo "frpfrp.pages.dev" > "$GITHUB_WORKSPACE/pages/CNAME"
          cp "$RUNNER_TEMP/frp.pub" "$GITHUB_WORKSPACE/pages/frp.pub"
          cp "$GITHUB_WORKSPACE/site-src/feed.sh" "$GITHUB_WORKSPACE/pages/feed.sh"

          publish_ext() {
            local ext="$1"
            local base_dir="$2"
            local luci_pattern="$3"
            local bin_dir_pattern="$4"

            mapfile -t luci_files < <(find artifacts -type f -path "$luci_pattern" | sort)
            if [ "${#luci_files[@]}" -eq 0 ]; then
              echo "No luci ${ext} artifacts found" >&2
              exit 1
            fi

            mapfile -t bin_artifact_dirs < <(find artifacts -mindepth 1 -maxdepth 1 -type d -name "$bin_dir_pattern" | sort)
            if [ "${#bin_artifact_dirs[@]}" -eq 0 ]; then
              echo "No bin ${ext} artifacts found" >&2
              exit 1
            fi

            for artifact_dir in "${bin_artifact_dirs[@]}"; do
              artifact_name="$(basename "$artifact_dir")"
              platform="${artifact_name#bin-}"
              platform="${platform%-${FRP_VERSION}-${ext}}"
              repo_dir="$base_dir/$platform/$repo_name"

              mkdir -p "$repo_dir"

              mapfile -t bin_files < <(find "$artifact_dir" -type f -name "*.${ext}" | sort)
              if [ "${#bin_files[@]}" -eq 0 ]; then
                echo "No ${ext} files found in $artifact_name" >&2
                exit 1
              fi

              cp "${bin_files[@]}" "$repo_dir/"
              cp "${luci_files[@]}" "$repo_dir/"
              if [ "$ext" = "ipk" ]; then
                (
                  cd "$repo_dir"
                  python3 "$GITHUB_WORKSPACE/site-src/scripts/build_ipk_index.py"
                  if [ -n "${USIGN_BIN:-}" ] && [ -n "${USIGN_KEY:-}" ]; then
                    "$USIGN_BIN" -S -m Packages -s "$USIGN_KEY" -x Packages.sig
                  fi
                )
              fi
            done
          }

          publish_ext "ipk" "$ipk_base_dir" '*/luci-*-*-ipk/*.ipk' 'bin-*-*-ipk'
          publish_ext "apk" "$apk_base_dir" '*/luci-*-*-apk/*.apk' 'bin-*-*-apk'

          python3 "$GITHUB_WORKSPACE/site-src/scripts/render_feed_index.py"

          find "$GITHUB_WORKSPACE/pages" -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
