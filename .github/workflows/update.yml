name: Update FRP

on:
  # schedule:
  #   - cron: '0 3 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-update]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: Get latest version
        id: version
        run: |
          latest=$(curl -fsSL https://api.github.com/repos/fatedier/frp/releases/latest | jq -r .tag_name)
          version=${latest#v}
          echo "Latest FRP version: $version"
          echo "LATEST_VERSION=$version" >> "$GITHUB_ENV"

      - name: Get current version
        id: current
        run: |
          if [ -f "frp.ver" ]; then
            current=$(cat frp.ver | xargs)
          else
            current=$(grep '^PKG_VERSION:=' frpc/Makefile | cut -d= -f2 | xargs)
          fi
          echo "Current FRP version: $current"
          echo "CURRENT_VERSION=$current" >> "$GITHUB_ENV"

      - name: Define architecture map
        id: archs
        run: |
          echo 'ARCH_LIST=amd64 arm64 arm_hf arm loong64 mips mips64 mips64le mipsle riscv64' >> "$GITHUB_ENV"

      - name: Download checksum file
        run: |
          curl -fsSL -o /tmp/frp_sha256_checksums.txt \
            "https://github.com/fatedier/frp/releases/download/v${LATEST_VERSION}/frp_sha256_checksums.txt"

      - name: Build hash table for frpc
        id: hash_frpc
        run: |
          echo "FRPC_HASHES:= \\" > /tmp/frpc.hashes
          download_failed=0
          arch_list=(${{ env.ARCH_LIST }})
          arch_count=${#arch_list[@]}
          last_index=$((arch_count - 1))

          for i in $(seq 0 $last_index); do
            arch="${arch_list[$i]}"
            hash=$(awk -v arch="$arch" -v version="$LATEST_VERSION" '
              $2 == ("frp_" version "_linux_" arch ".tar.gz") { print $1; exit }
            ' /tmp/frp_sha256_checksums.txt)

            if [ -z "$hash" ]; then
              echo "  $arch=DOWNLOAD_FAILED \\" >> /tmp/frpc.hashes
              echo "::warning::Failed to find hash for frpc arch $arch"
              download_failed=1
            else
              if [ $i -eq $last_index ]; then
                echo "  $arch=$hash" >> /tmp/frpc.hashes
              else
                echo "  $arch=$hash \\" >> /tmp/frpc.hashes
              fi
            fi
          done

          echo "FRPC_DOWNLOAD_FAILED=$download_failed" >> "$GITHUB_ENV"

      - name: Build hash table for frps
        id: hash_frps
        run: |
          echo "FRPS_HASHES:= \\" > /tmp/frps.hashes
          download_failed=0
          arch_list=(${{ env.ARCH_LIST }})
          arch_count=${#arch_list[@]}
          last_index=$((arch_count - 1))

          for i in $(seq 0 $last_index); do
            arch="${arch_list[$i]}"
            hash=$(awk -v arch="$arch" -v version="$LATEST_VERSION" '
              $2 == ("frp_" version "_linux_" arch ".tar.gz") { print $1; exit }
            ' /tmp/frp_sha256_checksums.txt)

            if [ -z "$hash" ]; then
              echo "  $arch=DOWNLOAD_FAILED \\" >> /tmp/frps.hashes
              echo "::warning::Failed to find hash for frps arch $arch"
              download_failed=1
            else
              if [ $i -eq $last_index ]; then
                echo "  $arch=$hash" >> /tmp/frps.hashes
              else
                echo "  $arch=$hash \\" >> /tmp/frps.hashes
              fi
            fi
          done

          echo "FRPS_DOWNLOAD_FAILED=$download_failed" >> "$GITHUB_ENV"

      - name: Replace version and hash table for frpc
        if: env.FRPC_DOWNLOAD_FAILED != '1'
        run: |
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${LATEST_VERSION}/" frpc/Makefile

          awk '
            BEGIN { inside=0 }
            /^# === FRPC_HASH_TABLE_START ===/ {
              inside=1
              print
              system("cat /tmp/frpc.hashes")
              next
            }
            /^# === FRPC_HASH_TABLE_END ===/ { inside=0 }
            inside==0 { print }
          ' frpc/Makefile > frpc/Makefile.new && mv frpc/Makefile.new frpc/Makefile

      - name: Replace version and hash table for frps
        if: env.FRPS_DOWNLOAD_FAILED != '1'
        run: |
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${LATEST_VERSION}/" frps/Makefile

          awk '
            BEGIN { inside=0 }
            /^# === FRPS_HASH_TABLE_START ===/ {
              inside=1
              print
              system("cat /tmp/frps.hashes")
              next
            }
            /^# === FRPS_HASH_TABLE_END ===/ { inside=0 }
            inside==0 { print }
          ' frps/Makefile > frps/Makefile.new && mv frps/Makefile.new frps/Makefile

      - name: Save latest version
        run: echo -n "${LATEST_VERSION}" > frp.ver

      - name: Commit and push changes
        if: env.FRPC_DOWNLOAD_FAILED != '1' && env.FRPS_DOWNLOAD_FAILED != '1'
        run: |
          git config --global user.name "frp-openwrt-bot"
          git config --global user.email "frp-openwrt-bot@users.noreply.github.com"
          git add frp.ver frpc/Makefile frps/Makefile

          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
            exit 0
          else
            git commit -m "Update FRP to $LATEST_VERSION"
            git push
          fi

      - name: Trigger Build
        if: env.FRPC_DOWNLOAD_FAILED != '1' && env.FRPS_DOWNLOAD_FAILED != '1'
        run: |
          if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
            echo "No update needed."
            exit 0
          fi

          curl -X POST https://api.github.com/repos/${{ github.repository }}/dispatches \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -d '{"event_type":"trigger-build"}'

