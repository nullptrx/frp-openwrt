name: Sync FRP Release

on:
  # GitHub cannot subscribe to release events from another repository directly,
  # so we poll the upstream latest release on a schedule.
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-update]

permissions:
  contents: write

concurrency:
  group: sync-frp-release
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: Get latest version
        id: version
        run: |
          latest=$(curl -fsSL https://api.github.com/repos/fatedier/frp/releases/latest | jq -r .tag_name)
          version=${latest#v}
          echo "Latest FRP version: $version"
          echo "LATEST_VERSION=$version" >> $GITHUB_ENV

      - name: Get current version
        id: current
        run: |
          if [ -f "frp.ver" ]; then
            current=$(cat frp.ver | xargs)
          else
            current=$(grep '^PKG_VERSION:=' frpc/Makefile | cut -d= -f2 | xargs)
          fi
          echo "Current FRP version: $current"
          echo "CURRENT_VERSION=$current" >> $GITHUB_ENV

      - name: Define architecture map
        id: archs
        run: |
          echo 'ARCH_LIST=amd64 arm64 arm_hf arm loong64 mips mips64 mips64le mipsle riscv64' >> $GITHUB_ENV

      - name: Download and hash for FRPC
        id: hash_frpc
        run: |
          mkdir -p frpc_tmp
          cd frpc_tmp
          echo "FRPC_HASHES:= \\" > ../frpc/hashes.tmp
          download_failed=0
          arch_list=(${{ env.ARCH_LIST }})
          arch_count=${#arch_list[@]}
          last_index=$((arch_count - 1))
          for i in $(seq 0 $last_index); do
            arch="${arch_list[$i]}"
            file="frp_${{ env.LATEST_VERSION }}_linux_${arch}.tar.gz"
            url="https://github.com/fatedier/frp/releases/download/v${{ env.LATEST_VERSION }}/$file"
            echo "Downloading $file..."
            if curl -fsSLO "$url"; then
              hash=$(sha256sum "$file" | awk '{print $1}')
              if [ $i -eq $last_index ]; then
                echo "  $arch=$hash" >> ../frpc/hashes.tmp
              else
                echo "  $arch=$hash \\" >> ../frpc/hashes.tmp
              fi
            else
              echo "  $arch=DOWNLOAD_FAILED \\" >> ../frpc/hashes.tmp
              echo "::warning::Failed to download $file"
              download_failed=1
            fi
          done
          echo "FRPC_DOWNLOAD_FAILED=$download_failed" >> $GITHUB_ENV

      - name: Download and hash for FRPS
        id: hash_frps
        run: |
          mkdir -p frps_tmp
          cd frps_tmp
          echo "FRPS_HASHES:= \\" > ../frps/hashes.tmp
          download_failed=0
          arch_list=(${{ env.ARCH_LIST }})
          arch_count=${#arch_list[@]}
          last_index=$((arch_count - 1))
          for i in $(seq 0 $last_index); do
            arch="${arch_list[$i]}"
            file="frp_${{ env.LATEST_VERSION }}_linux_${arch}.tar.gz"
            url="https://github.com/fatedier/frp/releases/download/v${{ env.LATEST_VERSION }}/$file"
            echo "Downloading $file..."
            if curl -fsSLO "$url"; then
              hash=$(sha256sum "$file" | awk '{print $1}')
              if [ $i -eq $last_index ]; then
                echo "  $arch=$hash" >> ../frps/hashes.tmp
              else
                echo "  $arch=$hash \\" >> ../frps/hashes.tmp
              fi
            else
              echo "  $arch=DOWNLOAD_FAILED \\" >> ../frps/hashes.tmp
              echo "::warning::Failed to download $file"
              download_failed=1
            fi
          done
          echo "FRPS_DOWNLOAD_FAILED=$download_failed" >> $GITHUB_ENV

      - name: Replace version and hash table for FRPC
        if: env.FRPC_DOWNLOAD_FAILED != '1'
        run: |
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${{ env.LATEST_VERSION }}/" frpc/Makefile

          awk '
            BEGIN {inside=0}
            /^# === FRPC_HASH_TABLE_START ===/ {
              inside=1
              print
              system("cat frpc/hashes.tmp")
              next
            }
            /^# === FRPC_HASH_TABLE_END ===/ {inside=0}
            inside==0 {print}
          ' frpc/Makefile > frpc/Makefile.new && mv frpc/Makefile.new frpc/Makefile

      - name: Replace version and hash table for FRPS
        if: env.FRPS_DOWNLOAD_FAILED != '1'
        run: |
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${{ env.LATEST_VERSION }}/" frps/Makefile

          awk '
            BEGIN {inside=0}
            /^# === FRPS_HASH_TABLE_START ===/ {
              inside=1
              print
              system("cat frps/hashes.tmp")
              next
            }
            /^# === FRPS_HASH_TABLE_END ===/ {inside=0}
            inside==0 {print}
          ' frps/Makefile > frps/Makefile.new && mv frps/Makefile.new frps/Makefile

      - name: Save latest version to frp.ver
        run: echo -n ${{ env.LATEST_VERSION }} > frp.ver

      - name: Commit and push changes
        if: env.FRPC_DOWNLOAD_FAILED != '1' && env.FRPS_DOWNLOAD_FAILED != '1'
        run: |
          git config --global user.name "frp-openwrt-bot"
          git config --global user.email "frp-openwrt-bot@users.noreply.github.com"
          git add frp.ver frpc/Makefile frps/Makefile

          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
            exit 0
          else
            git commit -m "Update FRP to $LATEST_VERSION"
            git push
          fi

      - name: Trigger Build
        if: env.FRPC_DOWNLOAD_FAILED != '1' && env.FRPS_DOWNLOAD_FAILED != '1'
        run: |
          if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
            echo "No update needed."
            exit 0
          fi

          curl -X POST https://api.github.com/repos/${{ github.repository }}/dispatches \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -d '{"event_type":"trigger-build"}'
